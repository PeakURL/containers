name: Containers

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: latest
      release_url:
        description: PeakURL release archive URL
        required: true
        default: https://releases.peakurl.org/latest.zip
      release_sha256:
        description: Optional SHA256 checksum for the release archive
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Resolve Docker Hub settings
        id: dockerhub
        shell: bash
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          NAMESPACE="${DOCKERHUB_NAMESPACE:-peakurl}"
          USERNAME="${DOCKERHUB_USERNAME:-$NAMESPACE}"
          IMAGE_NAME="docker.io/${NAMESPACE}/peakurl"

          {
            echo "namespace=$NAMESPACE"
            echo "username=$USERNAME"
            echo "image_name=$IMAGE_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve build inputs
        id: build
        shell: bash
        env:
          DOCKERHUB_IMAGE_NAME: ${{ steps.dockerhub.outputs.image_name }}
        run: |
          set -euo pipefail

          IMAGE_TAG="${{ inputs.image_tag }}"
          RELEASE_URL="${{ inputs.release_url }}"
          RELEASE_SHA256="${{ inputs.release_sha256 }}"

          if [ -z "$RELEASE_SHA256" ]; then
            TMP_ARCHIVE="$(mktemp)"
            trap 'rm -f "$TMP_ARCHIVE"' EXIT
            curl --fail --silent --show-error --location "$RELEASE_URL" --output "$TMP_ARCHIVE"
            RELEASE_SHA256="$(sha256sum "$TMP_ARCHIVE" | awk '{print $1}')"
          fi

          TAG_ALIASES="$IMAGE_TAG"
          if [[ "$IMAGE_TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            TAG_ALIASES="$IMAGE_TAG"$'\n'"${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"$'\n'"${BASH_REMATCH[1]}"$'\nlatest'
          fi

          REGISTRY_TAGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            REGISTRY_TAGS="${REGISTRY_TAGS}${DOCKERHUB_IMAGE_NAME}:$tag"$'\n'
          done < <(printf '%s\n' "$TAG_ALIASES")

          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          {
            echo "image_tag=$IMAGE_TAG"
            echo "release_url=$RELEASE_URL"
            echo "release_sha256=$RELEASE_SHA256"
            echo "build_date=$BUILD_DATE"
            echo "tag_aliases<<EOF"
            echo "$TAG_ALIASES"
            echo "EOF"
            echo "registry_tags<<EOF"
            echo "$REGISTRY_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/peakurl/Dockerfile
          push: true
          pull: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.build.outputs.registry_tags }}
          cache-from: type=gha,scope=peakurl-image
          cache-to: type=gha,mode=max,scope=peakurl-image
          build-args: |
            PEAKURL_VERSION=${{ steps.build.outputs.image_tag }}
            PEAKURL_RELEASE_URL=${{ steps.build.outputs.release_url }}
            PEAKURL_RELEASE_SHA256=${{ steps.build.outputs.release_sha256 }}
